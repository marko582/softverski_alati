server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gymcore-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/gym}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

gymcore:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  videos:
    directory: ${VIDEOS_DIR:../fitness-api/videos}
  cookie:
    refresh-name: refreshToken
    secure: ${COOKIE_SECURE:false}
  ollama:
    enabled: ${OLLAMA_ENABLED:true}
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2:3b}
    read-timeout-ms: ${OLLAMA_READ_TIMEOUT_MS:300000}
